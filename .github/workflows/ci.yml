name: VERYX CI

on:
  push:
    branches: [main]
    paths: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.event.repository.name == 'veryx' && '.' || 'veryx' }}
    env:
      DATABASE_URL: 'file:./dev.db'
      VERYX_JWT_SECRET: 'ci-only-secret-not-for-production-use'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Push schema + seed
        run: |
          npx prisma db push --skip-generate
          npx tsx prisma/seed.ts
      - name: Build
        run: npm run build
      - name: Smoke test API
        run: |
          npm start &
          sleep 8
          curl -sf http://localhost:3000/api/v1/health | grep -q '"status":"Systems Active"'
          curl -sf -X POST http://localhost:3000/api/v1/auth/login \
            -H 'content-type: application/json' \
            -d '{"email":"admin@veryx.io","password":"Veryx!2026"}' | grep -q '"success":true'
