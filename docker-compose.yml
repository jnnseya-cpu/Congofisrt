version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lcd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lcd_ai_os
      POSTGRES_USER: lcd_user
      POSTGRES_PASSWORD: lcd_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcd_user -d lcd_ai_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lcd-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lcd_user:lcd_password@postgres:5432/lcd_ai_os
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${BACKEND_SECRET_KEY:-lcd-secret-key}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lcd-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-lcd-nextauth-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: lcd_postgres_data
